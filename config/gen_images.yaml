# Image Generation Config
# Used by tools/gen_images.py
# CLI flags --project and --dry-run always override behavior.

api:
  base_url: http://localhost:8709    # registrar API base URL

generation:
  model_id: c3f4bea0-4cbf-49ea-b8ea-0b9d917ebc0c  # Nano Banana 2 (Gemini 3...)
  generations_per_model: 1                          # images per prompt
  width: 1920
  height: 1080
  cost_per_gen: 0.144                               # USD per single generation (TTI price)
  poll_interval_secs: 3.0                           # seconds between status polls
  poll_timeout_secs: 300.0                          # max wait per generation
